<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/backoffice :: head(${pageTitle})}"></head>
<body class="backoffice-body">
<div th:replace="~{fragments/backoffice :: shell(${activeKey}, ${pageTitle}, ${pageSubtitle}, ~{::content})}">
    <th:block th:fragment="content">
        <div class="alert alert-warning border-0 shadow-sm" th:if="${articleForm.reviewNote != null and !#strings.isEmpty(articleForm.reviewNote)}">
            <div class="fw-bold mb-1">Editorial note</div>
            <div th:text="${articleForm.reviewNote}">Review note</div>
        </div>

        <div class="card backoffice-card">
            <div class="card-body p-4 p-lg-5">
                <form th:action="@{/author/article/save}" th:object="${articleForm}" method="post" enctype="multipart/form-data">
                    <input type="hidden" th:field="*{id}">

                    <div class="row g-4">
                        <div class="col-xl-8">
                            <div class="mb-3">
                                <label class="form-label">Title</label>
                                <input type="text" class="form-control" th:field="*{title}" th:classappend="${#fields.hasErrors('title')} ? ' is-invalid' : ''">
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Slug</label>
                                <input type="text" class="form-control" th:field="*{slug}" th:classappend="${#fields.hasErrors('slug')} ? ' is-invalid' : ''">
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('slug')}" th:errors="*{slug}"></div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Summary</label>
                                <textarea class="form-control" rows="3" th:field="*{summary}" th:classappend="${#fields.hasErrors('summary')} ? ' is-invalid' : ''"></textarea>
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('summary')}" th:errors="*{summary}"></div>
                            </div>
                        </div>

                        <div class="col-xl-4">
                            <div class="mb-3">
                                <label class="form-label">Category</label>
                                <select class="form-select" th:field="*{categoryId}" th:classappend="${#fields.hasErrors('categoryId')} ? ' is-invalid' : ''">
                                    <option value="">Select a category</option>
                                    <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}"></option>
                                </select>
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('categoryId')}" th:errors="*{categoryId}"></div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Current status</label>
                                <input type="text" class="form-control" th:value="${articleForm.status}" readonly>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Thumbnail</label>
                                <input type="file" name="file" class="form-control" accept="image/*">
                                <div class="mt-3 p-3 border rounded bg-light" th:if="${articleForm.thumbnailUrl != null}">
                                    <div class="small text-muted mb-2">Current thumbnail</div>
                                    <img th:src="${articleForm.thumbnailUrl}" alt="Thumbnail" class="img-fluid rounded">
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label">Content</label>
                        <textarea id="editor-content" th:field="*{content}" th:classappend="${#fields.hasErrors('content')} ? ' is-invalid' : ''"></textarea>
                        <div class="invalid-feedback d-block" th:if="${#fields.hasErrors('content')}" th:errors="*{content}"></div>
                    </div>

                    <div class="d-flex justify-content-end">
                        <a th:href="@{/author}" class="btn btn-light border me-2">Cancel</a>
                        <button type="submit" class="btn btn-primary px-4" th:text="${articleForm.id == null ? 'Save Draft' : 'Save Changes'}">Save</button>
                    </div>
                </form>
            </div>
        </div>
    </th:block>
</div>
<script src="https://cdn.ckeditor.com/ckeditor5/41.1.0/classic/ckeditor.js"></script>
<script>
    ClassicEditor
        .create(document.querySelector('#editor-content'))
        .catch(error => console.error(error));
</script>
<script>
    function generateSlug(text) {
        return text.toString().toLowerCase()
            .normalize('NFD')
            .replace(/[\u0300-\u036f]/g, '')
            .replace(/\u0111/g, 'd')
            .replace(/[^a-z0-9\s-]/g, '')
            .trim()
            .replace(/\s+/g, '-')
            .replace(/-+/g, '-');
    }

    const titleInput = document.getElementById('title');
    const slugInput = document.getElementById('slug');

    if (titleInput && slugInput) {
        titleInput.addEventListener('input', function() {
            slugInput.value = generateSlug(this.value);
        });
    }
</script>
</body>
</html>
