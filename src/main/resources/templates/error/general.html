<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${errorTitle}">Lỗi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card shadow-sm border-0">
                <div class="card-body p-5">
                    <div class="text-uppercase text-danger fw-bold mb-2" th:text="'Lỗi ' + ${status}">Lỗi</div>
                    <h1 class="h3 mb-3" th:text="${errorTitle}">Đã xảy ra sự cố</h1>
                    <p class="text-muted mb-4" th:text="${errorMessage}">Không thể xử lý yêu cầu hiện tại.</p>
                    <a th:href="@{/}" class="btn btn-primary">Quay về trang chủ</a>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
