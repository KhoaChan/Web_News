<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đăng nhập - VnExpress</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f6f9; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .auth-card { width: 100%; max-width: 400px; padding: 40px; border: none; border-radius: 10px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .brand-text { color: #9f224e; font-family: serif; font-weight: bold; font-size: 2.5rem; text-align: center; margin-bottom: 30px; }
    </style>
</head>
<body>

<div class="card auth-card">
    <a th:href="@{/}" class="text-decoration-none"><div class="brand-text">VnExpress</div></a>
    
    <div th:if="${param.success}" class="alert alert-success small text-center">
        Đăng ký thành công! Vui lòng đăng nhập.
    </div>

    <div th:if="${param.error}" class="alert alert-danger small text-center">
        Tài khoản hoặc mật khẩu không chính xác!
    </div>

    <form th:action="@{/login}" method="post">
        <div class="mb-3">
            <label class="form-label fw-bold">Tên đăng nhập</label>
            <input type="text" name="username" class="form-control" required placeholder="Nhập tài khoản...">
        </div>
        <div class="mb-4">
            <label class="form-label fw-bold">Mật khẩu</label>
            <input type="password" name="password" class="form-control" required placeholder="Nhập mật khẩu...">
        </div>
        <button type="submit" class="btn w-100 fw-bold text-white" style="background-color: #9f224e;">Đăng nhập</button>
    </form>
    
    <div class="text-center mt-4 small">
        Chưa có tài khoản? <a th:href="@{/register}" class="text-danger fw-bold text-decoration-none">Đăng ký ngay</a>
    </div>
</div>

</body>
</html>
