<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<nav th:fragment="siteHeader(categories, keyword)" class="navbar navbar-light navbar-expand-lg bg-white sticky-top mb-4 public-site-header">
    <style>
        .public-site-header {
            border-bottom: 1px solid #e5e7eb;
            padding: 0;
            background: #fff;
        }

        .public-site-header .navbar-brand {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            color: #9f224e !important;
        }

        .public-site-header .nav-link {
            font-weight: 500;
            text-transform: uppercase;
            font-size: 0.85rem;
            padding: 15px 18px !important;
            color: #334155 !important;
            border-bottom: 3px solid transparent;
            transition: all 0.2s ease;
        }

        .public-site-header .nav-link:hover,
        .public-site-header .nav-link:focus {
            color: #9f224e !important;
            border-bottom-color: #9f224e;
        }

        .public-site-header .nav-link.dropdown-toggle::after {
            margin-left: 8px;
        }

        .public-site-header .form-control {
            min-width: 220px;
            border-radius: 999px;
            padding-left: 16px;
        }

        .account-trigger {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 10px 0 !important;
            text-transform: none !important;
            border-bottom: none !important;
        }

        .account-trigger:hover,
        .account-trigger:focus {
            border-bottom-color: transparent !important;
        }

        .account-avatar {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: #e2e8f0;
            color: #475569;
            font-weight: 800;
            overflow: hidden;
            flex-shrink: 0;
        }

        .account-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .account-name {
            font-size: 0.95rem;
            color: #0f172a;
            font-weight: 600;
        }

        .account-dropdown {
            min-width: 270px;
            border-radius: 18px;
            padding: 10px 0;
            border: 1px solid #e2e8f0;
            box-shadow: 0 18px 40px rgba(15, 23, 42, 0.12);
        }

        .account-dropdown .dropdown-header {
            padding: 14px 18px;
            font-weight: 700;
            color: #0f172a;
        }

        .account-dropdown .dropdown-subtitle {
            display: block;
            margin-top: 4px;
            color: #64748b;
            font-size: 0.82rem;
            font-weight: 500;
        }

        .account-dropdown .dropdown-item {
            padding: 12px 18px;
            color: #334155;
            font-size: 0.95rem;
        }

        .account-dropdown .dropdown-item:hover,
        .account-dropdown .dropdown-item:focus {
            background: #f8fafc;
            color: #0f172a;
        }
    </style>

    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/}">News</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#publicNavbar"
                aria-controls="publicNavbar" aria-expanded="false" aria-label="Mở điều hướng">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="publicNavbar">
            <ul class="navbar-nav mx-auto">
                <li class="nav-item"><a class="nav-link" th:href="@{/}">Mới nhất</a></li>
                <li class="nav-item" th:each="cat : ${categories}">
                    <a class="nav-link" th:href="@{/category/{slug}(slug=${cat.slug})}" th:text="${cat.name}">Chuyên mục</a>
                </li>
            </ul>

            <form class="d-flex me-lg-3 my-3 my-lg-0" th:action="@{/search}" method="get">
                <input class="form-control form-control-sm" type="search" name="keyword" th:value="${keyword}"
                       placeholder="Tìm bài viết">
            </form>

            <ul class="navbar-nav ms-auto align-items-lg-center">
                <li class="nav-item" sec:authorize="isAnonymous()">
                    <a class="nav-link text-primary fw-bold" th:href="@{/login}">Đăng nhập</a>
                </li>
                <li class="nav-item" sec:authorize="isAnonymous()">
                    <a class="nav-link text-success fw-bold" th:href="@{/register}">Đăng ký</a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('AUTHOR')">
                    <a class="nav-link text-danger fw-bold" th:href="@{/author}">Tác giả</a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('EDITOR')">
                    <a class="nav-link text-danger fw-bold" th:href="@{/editor}">Biên tập</a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link text-danger fw-bold" th:href="@{/admin}">Quản trị</a>
                </li>
                <li class="nav-item dropdown" sec:authorize="isAuthenticated()">
                    <a class="nav-link dropdown-toggle account-trigger" href="#" role="button" data-bs-toggle="dropdown"
                       aria-expanded="false">
                        <span class="account-avatar">
                            <img th:if="${#authentication.principal.avatarUrl != null and !#strings.isEmpty(#authentication.principal.avatarUrl)}"
                                 th:src="${#authentication.principal.avatarUrl}"
                                 alt="Avatar">
                            <span th:if="${#authentication.principal.avatarUrl == null or #strings.isEmpty(#authentication.principal.avatarUrl)}"
                                  th:text="${#strings.substring(#authentication.principal.displayName, 0, 1)}">N</span>
                        </span>
                        <span class="account-name" sec:authentication="principal.displayName">Người dùng</span>
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end account-dropdown">
                        <li class="dropdown-header">
                            <span sec:authentication="principal.displayName">Người dùng</span>
                            <span class="dropdown-subtitle">Tài khoản News</span>
                        </li>
                        <li><a class="dropdown-item" th:href="@{/profile}">Thông tin chung</a></li>
                        <li><a class="dropdown-item" th:href="@{/profile/comments}">Ý kiến của bạn</a></li>
                        <li><a class="dropdown-item" th:href="@{/profile/saved}">Tin đã lưu</a></li>
                        <li><a class="dropdown-item" th:href="@{/profile/viewed}">Tin đã xem</a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li><a class="dropdown-item text-danger" th:href="@{/logout}">Thoát</a></li>
                    </ul>
                </li>
            </ul>
        </div>
    </div>
</nav>

<th:block th:fragment="siteScripts">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</th:block>
</body>
</html>
