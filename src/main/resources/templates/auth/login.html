<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #fdf5f7 0%, #eef4ff 100%); font-family: 'Roboto', sans-serif; }
        .auth-card { width: 100%; max-width: 430px; border: none; border-radius: 20px; box-shadow: 0 20px 60px rgba(0, 0, 0, 0.12); }
        .brand { font-family: 'Playfair Display', serif; color: #9f224e; }
    </style>
</head>
<body>
<div class="card auth-card">
    <div class="card-body p-4 p-md-5">
        <div class="text-center mb-4">
            <div class="brand h2 mb-2">VnExpress</div>
            <p class="text-muted mb-0">Sign in to continue to the admin and profile area.</p>
        </div>

        <div class="alert alert-danger" th:if="${loginError}">Invalid username or password.</div>
        <div class="alert alert-success" th:if="${logoutSuccess}">You have been logged out successfully.</div>
        <div class="alert alert-success" th:if="${registeredSuccess}">Registration successful. Please sign in.</div>

        <form th:action="@{/login}" method="post">
            <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" name="username" class="form-control" placeholder="Enter username" required>
            </div>
            <div class="mb-4">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control" placeholder="Enter password" required>
            </div>
            <button type="submit" class="btn btn-danger w-100 py-2 fw-bold">Login</button>
        </form>

        <div class="d-flex justify-content-between mt-4 small">
            <a th:href="@{/register}" class="text-decoration-none">Create an account</a>
            <a th:href="@{/}" class="text-decoration-none text-muted">Back to home</a>
        </div>
    </div>
</div>
</body>
</html>
