<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Thông tin chung | News</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body { background: #f8fafc; font-family: 'Roboto', sans-serif; color: #1f2937; }
    </style>
</head>
<body>
<nav th:replace="~{fragments/public-header :: siteHeader(${categories}, ${null})}"></nav>

<div th:replace="~{user/fragments/account-shell :: shell(${activeKey}, ~{::content})}">
    <th:block th:fragment="content">
        <th:block th:replace="~{user/fragments/profile-content :: content}"></th:block>
    </th:block>
</div>

<th:block th:replace="~{fragments/public-header :: siteScripts}"></th:block>
</body>
</html>
