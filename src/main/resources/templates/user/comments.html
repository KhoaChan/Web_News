<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Ý kiến của bạn | News</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body { background: #f8fafc; font-family: 'Roboto', sans-serif; color: #1f2937; }
    </style>
</head>
<body>
<nav th:replace="~{fragments/public-header :: siteHeader(${categories}, ${null})}"></nav>

<div th:replace="~{user/fragments/account-shell :: shell(${activeKey}, ~{::content})}">
    <th:block th:fragment="content">
        <div th:if="${#lists.isEmpty(comments)}" class="reader-empty">
            Bạn chưa có bình luận nào gắn với tài khoản này.
        </div>

        <div th:if="${not #lists.isEmpty(comments)}">
            <div th:each="comment : ${comments}" class="reader-article-row">
                <div class="d-flex justify-content-between flex-wrap gap-3 mb-2">
                    <a class="reader-article-title"
                       th:href="@{/article/{slug}(slug=${comment.article.slug})}"
                       th:text="${comment.article.title}">Tiêu đề bài viết</a>
                    <span class="badge rounded-pill text-bg-light border" th:text="${comment.status.displayName}">Chờ duyệt</span>
                </div>
                <p class="mb-2 text-secondary" th:text="${comment.content}">Nội dung bình luận</p>
                <div class="small text-muted d-flex justify-content-between flex-wrap gap-2">
                    <span th:text="${comment.article.category.name}">Chuyên mục</span>
                    <span th:text="${#temporals.format(comment.createdAt, 'HH:mm - dd/MM/yyyy')}">09:30 - 05/04/2026</span>
                </div>
            </div>
        </div>
    </th:block>
</div>

<th:block th:replace="~{fragments/public-header :: siteScripts}"></th:block>
</body>
</html>
