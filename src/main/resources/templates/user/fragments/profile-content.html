<div xmlns:th="http://www.thymeleaf.org" th:fragment="content">
    <div class="mb-5">
        <h2 class="h4 fw-bold mb-4">Thông tin tài khoản</h2>

        <div class="reader-data-row">
            <div class="fw-semibold text-secondary">Ảnh đại diện</div>
            <div>
                <div class="d-flex align-items-center gap-3 flex-wrap">
                    <div class="reader-avatar-preview">
                        <img th:if="${currentUser.avatarUrl != null and !#strings.isEmpty(currentUser.avatarUrl)}"
                             th:src="${currentUser.avatarUrl}" alt="Ảnh đại diện">
                        <span th:if="${currentUser.avatarUrl == null or #strings.isEmpty(currentUser.avatarUrl)}"
                              th:text="${#strings.substring(currentUser.fullName != null and !#strings.isEmpty(currentUser.fullName) ? currentUser.fullName : currentUser.username, 0, 1)}">N</span>
                    </div>
                    <form class="d-flex gap-2 flex-wrap align-items-center" th:action="@{/profile/avatar}" method="post" enctype="multipart/form-data">
                        <input class="form-control" type="file" name="avatarFile" accept="image/*">
                        <button type="submit" class="btn btn-outline-secondary">Cập nhật ảnh</button>
                    </form>
                </div>
                <div class="small text-muted mt-2">Tệp ảnh tối đa 5 MB. Ưu tiên ảnh vuông để hiển thị đẹp hơn.</div>
            </div>
            <div></div>
        </div>

        <div class="reader-data-row">
            <div class="fw-semibold text-secondary">Tên đăng nhập</div>
            <div>
                <div class="fw-semibold" th:text="${currentUser.username}">username</div>
                <div class="small text-muted" th:text="${currentUser.role.displayName}">Người dùng</div>
            </div>
            <div class="text-muted small">Không thể thay đổi</div>
        </div>

        <form th:action="@{/profile}" th:object="${profileForm}" method="post">
            <div class="reader-data-row">
                <div class="fw-semibold text-secondary">Email</div>
                <div>
                    <input type="email" class="form-control" th:field="*{email}" th:classappend="${#fields.hasErrors('email')} ? ' is-invalid' : ''">
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                </div>
                <div>
                    <button type="submit" class="btn btn-link text-decoration-none">Lưu</button>
                </div>
            </div>

            <div class="reader-data-row">
                <div class="fw-semibold text-secondary">Họ tên</div>
                <div>
                    <input type="text" class="form-control" th:field="*{fullName}" th:classappend="${#fields.hasErrors('fullName')} ? ' is-invalid' : ''">
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}"></div>
                </div>
                <div class="text-muted small">Hiển thị công khai</div>
            </div>

            <div class="reader-data-row">
                <div class="fw-semibold text-secondary">Ngày tham gia</div>
                <div th:text="${#temporals.format(currentUser.createdAt, 'dd/MM/yyyy')}">01/04/2026</div>
                <div class="text-muted small">Tự động</div>
            </div>

            <div class="reader-data-row">
                <div class="fw-semibold text-secondary">Ngày sinh</div>
                <div>
                    <input type="date" class="form-control" th:field="*{birthDate}" th:classappend="${#fields.hasErrors('birthDate')} ? ' is-invalid' : ''">
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('birthDate')}" th:errors="*{birthDate}"></div>
                </div>
                <div></div>
            </div>

            <div class="reader-data-row">
                <div class="fw-semibold text-secondary">Giới tính</div>
                <div>
                    <select class="form-select" th:field="*{gender}" th:classappend="${#fields.hasErrors('gender')} ? ' is-invalid' : ''">
                        <option value="">Chưa cập nhật</option>
                        <option th:each="genderOption : ${genders}"
                                th:value="${genderOption.name()}"
                                th:text="${genderOption.displayName}">Nam</option>
                    </select>
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('gender')}" th:errors="*{gender}"></div>
                </div>
                <div></div>
            </div>

            <div class="pt-4">
                <button type="submit" class="btn btn-danger px-4">Lưu thông tin cá nhân</button>
            </div>
        </form>
    </div>

    <div>
        <h2 class="h4 fw-bold mb-4">Bảo mật</h2>
        <form th:action="@{/profile/password}" th:object="${changePasswordForm}" method="post">
            <div class="reader-data-row">
                <div class="fw-semibold text-secondary">Mật khẩu hiện tại</div>
                <div>
                    <input type="password" class="form-control" th:field="*{currentPassword}" th:classappend="${#fields.hasErrors('currentPassword')} ? ' is-invalid' : ''">
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('currentPassword')}" th:errors="*{currentPassword}"></div>
                </div>
                <div></div>
            </div>

            <div class="reader-data-row">
                <div class="fw-semibold text-secondary">Mật khẩu mới</div>
                <div>
                    <input type="password" class="form-control" th:field="*{newPassword}" th:classappend="${#fields.hasErrors('newPassword')} ? ' is-invalid' : ''">
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('newPassword')}" th:errors="*{newPassword}"></div>
                </div>
                <div></div>
            </div>

            <div class="reader-data-row">
                <div class="fw-semibold text-secondary">Xác nhận mật khẩu</div>
                <div>
                    <input type="password" class="form-control" th:field="*{confirmPassword}" th:classappend="${#fields.hasErrors('confirmPassword')} ? ' is-invalid' : ''">
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></div>
                </div>
                <div>
                    <button type="submit" class="btn btn-outline-primary">Đổi mật khẩu</button>
                </div>
            </div>
        </form>
    </div>
</div>
