<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/backoffice :: head(${pageTitle})}"></head>
<body class="backoffice-body">
<div th:replace="~{fragments/backoffice :: shell(${activeKey}, ${pageTitle}, ${pageSubtitle}, ~{::content})}">
    <th:block th:fragment="content">
        <div class="card backoffice-card">
            <div class="card-body p-4 p-lg-5">
                <form th:action="@{/admin/user/save}" th:object="${userForm}" method="post">
                    <input type="hidden" th:field="*{id}">

                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">Tên đăng nhập</label>
                            <input type="text" class="form-control" th:field="*{username}" th:classappend="${#fields.hasErrors('username')} ? ' is-invalid' : ''">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Email</label>
                            <input type="email" class="form-control" th:field="*{email}" th:classappend="${#fields.hasErrors('email')} ? ' is-invalid' : ''">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                        </div>
                    </div>

                    <div class="row g-3 mt-1">
                        <div class="col-md-6">
                            <label class="form-label">Họ và tên</label>
                            <input type="text" class="form-control" th:field="*{fullName}" th:classappend="${#fields.hasErrors('fullName')} ? ' is-invalid' : ''">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}"></div>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Vai trò</label>
                            <select class="form-select" th:field="*{role}" th:classappend="${#fields.hasErrors('role')} ? ' is-invalid' : ''">
                                <option th:each="roleValue : ${roles}" th:value="${roleValue.name()}" th:text="${roleValue.displayName}"></option>
                            </select>
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('role')}" th:errors="*{role}"></div>
                        </div>
                        <div class="col-md-3 d-flex align-items-end">
                            <div class="form-check form-switch mb-2">
                                <input class="form-check-input" type="checkbox" th:field="*{enabled}">
                                <label class="form-check-label" for="enabled">Cho phép đăng nhập</label>
                            </div>
                        </div>
                    </div>

                    <div class="mb-4 mt-3">
                        <label class="form-label">Mật khẩu</label>
                        <input type="password" class="form-control" th:field="*{password}" th:classappend="${#fields.hasErrors('password')} ? ' is-invalid' : ''">
                        <div class="form-text" th:text="${userForm.id == null ? 'Bắt buộc khi tạo người dùng mới.' : 'Để trống nếu muốn giữ nguyên mật khẩu hiện tại.'}">Gợi ý mật khẩu</div>
                        <div class="invalid-feedback d-block" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
                    </div>

                    <div class="d-flex justify-content-end">
                        <a th:href="@{/admin/users}" class="btn btn-light border me-2">Hủy</a>
                        <button type="submit" class="btn btn-primary px-4" th:text="${userForm.id == null ? 'Tạo người dùng' : 'Lưu thay đổi'}">Lưu</button>
                    </div>
                </form>
            </div>
        </div>
    </th:block>
</div>
</body>
</html>
