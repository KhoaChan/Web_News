<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title th:text="${category.id == null ? 'Thêm Chuyên Mục' : 'Sửa Chuyên Mục'}">Quản lý Chuyên mục</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Nunito', sans-serif;
            background-color: #f4f6f9;
            overflow-x: hidden;
        }

        /* Sidebar Styling */
        .sidebar { min-height: 100vh; background-color: #343a40; color: #fff; padding-top: 20px; }
        .sidebar .nav-link { color: #c2c7d0; padding: 12px 20px; margin-bottom: 5px; border-radius: 5px; transition: all 0.3s; }
        .sidebar .nav-link:hover, .sidebar .nav-link.active { background-color: #007bff; color: #fff; }
        .sidebar .nav-link i { width: 25px; text-align: center; margin-right: 10px; }

        /* Main Content */
        .main-content { padding: 30px; }
        .card { border: none; box-shadow: 0 0 15px rgba(0,0,0,0.05); border-radius: 10px; }
        
        /* Form Styling */
        label { font-weight: 600; color: #495057; margin-bottom: 8px; }
        .form-control { border-radius: 6px; padding: 10px 15px; }
        .form-control:focus { border-color: #80bdff; box-shadow: 0 0 0 0.2rem rgba(0,123,255,.25); }
    </style>
</head>
<body>

<div class="container-fluid p-0">
    <div class="row g-0">
        
        <div class="col-md-2 sidebar d-none d-md-block">
            <h4 class="text-center mb-4 fw-bold text-white">
                <i class="fas fa-newspaper text-primary"></i> Admin Panel
            </h4>
            <ul class="nav flex-column px-2">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/admin}">
                        <i class="fas fa-tachometer-alt"></i> Quản lý Bài viết
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active" th:href="@{/admin/categories}">
                        <i class="fas fa-folder-open"></i> Quản lý Chuyên mục
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/admin/comments}">
                        <i class="fas fa-comments"></i> Duyệt Bình luận
                    </a>
                </li>
                <li class="nav-item mt-4">
                    <a class="nav-link text-warning" th:href="@{/}">
                        <i class="fas fa-external-link-alt"></i> Xem trang chủ web
                    </a>
                </li>
            </ul>
        </div>

        <div class="col-md-10 main-content">
            
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <h2 class="fw-bold text-dark m-0" th:text="${category.id == null ? '📁 Thêm Chuyên Mục' : '📁 Sửa Chuyên Mục'}">Form Chuyên mục</h2>
                    <nav aria-label="breadcrumb">
                        <ol class="breadcrumb mb-0 mt-1">
                            <li class="breadcrumb-item"><a th:href="@{/admin/categories}" class="text-decoration-none">Chuyên mục</a></li>
                            <li class="breadcrumb-item active" aria-current="page" th:text="${category.id == null ? 'Thêm mới' : 'Chỉnh sửa'}"></li>
                        </ol>
                    </nav>
                </div>
                
                <div>
                    <span class="me-3 fw-bold text-secondary" sec:authorize="isAuthenticated()">
                        Xin chào, <span sec:authentication="name">Admin</span>!
                    </span>
                    <a th:href="@{/logout}" class="btn btn-outline-danger btn-sm">
                        <i class="fas fa-sign-out-alt"></i> Đăng xuất
                    </a>
                </div>
            </div>

            <div class="row">
                <div class="col-lg-6"> <div class="card">
                        <div class="card-body p-4">
                            
                            <form th:action="@{/admin/category/save}" th:object="${category}" method="post">
                                
                                <input type="hidden" th:field="*{id}" />
                                
                                <div class="mb-4">
                                    <label class="form-label">Tên chuyên mục <span class="text-danger">*</span></label>
                                    <input type="text" class="form-control" th:field="*{name}" required placeholder="Ví dụ: Đời sống, Kinh doanh..." />
                                </div>
                                
                                <div class="mb-4">
                                    <label class="form-label">Đường dẫn (Slug) <span class="text-danger">*</span></label>
                                    <input type="text" class="form-control" th:field="*{slug}" required placeholder="doi-song" />
                                    <small class="text-muted">Đường dẫn URL, viết liền không dấu (VD: the-thao).</small>
                                </div>

                                <hr class="my-4">

                                <div class="d-flex justify-content-end">
                                    <a th:href="@{/admin/categories}" class="btn btn-light me-2 border">
                                        <i class="fas fa-times"></i> Hủy bỏ
                                    </a>
                                    <button type="submit" class="btn btn-primary px-4">
                                        <i class="fas fa-save"></i> <span th:text="${category.id == null ? 'Lưu chuyên mục' : 'Cập nhật'}"></span>
                                    </button>
                                </div>
                                
                            </form>
                            
                        </div>
                    </div>
                </div>
            </div>
            
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
