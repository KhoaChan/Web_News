<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title th:text="${categoryForm.id == null ? 'Create Category' : 'Edit Category'}">Category Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Nunito', sans-serif; background-color: #f4f6f9; }
        .sidebar { min-height: 100vh; background-color: #343a40; color: #fff; padding-top: 20px; }
        .sidebar .nav-link { color: #c2c7d0; padding: 12px 20px; margin-bottom: 5px; border-radius: 5px; transition: all 0.3s; }
        .sidebar .nav-link:hover, .sidebar .nav-link.active { background-color: #007bff; color: #fff; }
        .main-content { padding: 30px; }
        .card { border: none; box-shadow: 0 0 15px rgba(0,0,0,0.05); border-radius: 10px; }
    </style>
</head>
<body>
<div class="container-fluid p-0">
    <div class="row g-0">
        <div class="col-md-2 sidebar d-none d-md-block">
            <h4 class="text-center mb-4 fw-bold text-white"><i class="fas fa-newspaper text-primary"></i> Admin Panel</h4>
            <ul class="nav flex-column px-2">
                <li class="nav-item"><a class="nav-link" th:href="@{/admin}"><i class="fas fa-tachometer-alt"></i> Articles</a></li>
                <li class="nav-item"><a class="nav-link active" th:href="@{/admin/categories}"><i class="fas fa-folder-open"></i> Categories</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/admin/users}"><i class="fas fa-users"></i> Users</a></li>
                <li class="nav-item mt-4"><a class="nav-link text-warning" th:href="@{/}"><i class="fas fa-external-link-alt"></i> View Site</a></li>
            </ul>
        </div>

        <div class="col-md-10 main-content">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <h2 class="fw-bold m-0" th:text="${categoryForm.id == null ? 'Create Category' : 'Edit Category'}">Category Form</h2>
                    <p class="text-muted mb-0">Keep category data unique and easy to manage.</p>
                </div>
                <div>
                    <span class="me-3 fw-bold text-secondary" sec:authorize="isAuthenticated()">
                        Signed in as <span sec:authentication="principal.displayName">Admin</span>
                    </span>
                    <a th:href="@{/logout}" class="btn btn-outline-danger btn-sm"><i class="fas fa-sign-out-alt"></i> Logout</a>
                </div>
            </div>

            <div class="card">
                <div class="card-body p-4">
                    <form th:action="@{/admin/category/save}" th:object="${categoryForm}" method="post">
                        <input type="hidden" th:field="*{id}">

                        <div class="mb-3">
                            <label class="form-label">Name</label>
                            <input type="text" class="form-control" th:field="*{name}" th:classappend="${#fields.hasErrors('name')} ? ' is-invalid' : ''">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Slug</label>
                            <input type="text" class="form-control" th:field="*{slug}" th:classappend="${#fields.hasErrors('slug')} ? ' is-invalid' : ''">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('slug')}" th:errors="*{slug}"></div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label">Description</label>
                            <textarea class="form-control" rows="3" th:field="*{description}" th:classappend="${#fields.hasErrors('description')} ? ' is-invalid' : ''"></textarea>
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('description')}" th:errors="*{description}"></div>
                        </div>

                        <div class="d-flex justify-content-end">
                            <a th:href="@{/admin/categories}" class="btn btn-light border me-2">Cancel</a>
                            <button type="submit" class="btn btn-primary px-4" th:text="${categoryForm.id == null ? 'Create Category' : 'Save Changes'}">Save</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
