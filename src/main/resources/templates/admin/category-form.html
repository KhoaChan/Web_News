<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/backoffice :: head(${pageTitle})}"></head>
<body class="backoffice-body">
<div th:replace="~{fragments/backoffice :: shell(${activeKey}, ${pageTitle}, ${pageSubtitle}, ~{::content})}">
    <th:block th:fragment="content">
        <div class="card backoffice-card">
            <div class="card-body p-4 p-lg-5">
                <form th:action="@{/admin/category/save}" th:object="${categoryForm}" method="post">
                    <input type="hidden" th:field="*{id}">

                    <div class="mb-3">
                        <label class="form-label">Name</label>
                        <input type="text" class="form-control" th:field="*{name}" th:classappend="${#fields.hasErrors('name')} ? ' is-invalid' : ''">
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Slug</label>
                        <input type="text" class="form-control" th:field="*{slug}" th:classappend="${#fields.hasErrors('slug')} ? ' is-invalid' : ''">
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('slug')}" th:errors="*{slug}"></div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label">Description</label>
                        <textarea class="form-control" rows="4" th:field="*{description}" th:classappend="${#fields.hasErrors('description')} ? ' is-invalid' : ''"></textarea>
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('description')}" th:errors="*{description}"></div>
                    </div>

                    <div class="d-flex justify-content-end">
                        <a th:href="@{/admin/categories}" class="btn btn-light border me-2">Cancel</a>
                        <button type="submit" class="btn btn-primary px-4" th:text="${categoryForm.id == null ? 'Create Category' : 'Save Changes'}">Save</button>
                    </div>
                </form>
            </div>
        </div>
    </th:block>
</div>
</body>
</html>
