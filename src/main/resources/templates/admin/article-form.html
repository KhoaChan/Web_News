<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title th:text="${article.id == null ? 'Viết Bài Mới' : 'Sửa Bài Viết'}">Quản lý bài viết</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.ckeditor.com/ckeditor5/41.1.0/classic/ckeditor.js"></script>

    <style>
        body {
            font-family: 'Nunito', sans-serif;
            background-color: #f4f6f9;
            overflow-x: hidden;
        }

        /* Sidebar Styling (Đồng bộ với Dashboard) */
        .sidebar { min-height: 100vh; background-color: #343a40; color: #fff; padding-top: 20px; }
        .sidebar .nav-link { color: #c2c7d0; padding: 12px 20px; margin-bottom: 5px; border-radius: 5px; transition: all 0.3s; }
        .sidebar .nav-link:hover, .sidebar .nav-link.active { background-color: #007bff; color: #fff; }
        .sidebar .nav-link i { width: 25px; text-align: center; margin-right: 10px; }

        /* Main Content */
        .main-content { padding: 30px; }
        .card { border: none; box-shadow: 0 0 15px rgba(0,0,0,0.05); border-radius: 10px; }
        
        /* Form Styling */
        label { font-weight: 600; color: #495057; margin-bottom: 8px; }
        .form-control, .form-select { border-radius: 6px; padding: 10px 15px; }
        .form-control:focus, .form-select:focus { border-color: #80bdff; box-shadow: 0 0 0 0.2rem rgba(0,123,255,.25); }
        
        /* Ảnh Thumbnail Preview */
        .current-thumb-wrapper { background: #f8f9fa; padding: 10px; border-radius: 6px; border: 1px dashed #ced4da; display: inline-block; margin-top: 10px; }
        .current-thumb { max-width: 200px; border-radius: 4px; display: block; }
        
        /* CKEditor Height */
        .ck-editor__editable_inline { min-height: 400px; border-radius: 0 0 6px 6px !important; }
        .ck-toolbar { border-radius: 6px 6px 0 0 !important; }
    </style>
</head>
<body>

<div class="container-fluid p-0">
    <div class="row g-0">
        
        <div class="col-md-2 sidebar d-none d-md-block">
            <h4 class="text-center mb-4 fw-bold text-white">
                <i class="fas fa-newspaper text-primary"></i> Admin Panel
            </h4>
            <ul class="nav flex-column px-2">
                <li class="nav-item">
                    <a class="nav-link active" th:href="@{/admin}">
                        <i class="fas fa-tachometer-alt"></i> Quản lý Bài viết
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/admin/categories}">
                        <i class="fas fa-folder-open"></i> Quản lý Chuyên mục
                    </a>
                </li>
                <li class="nav-item mt-4">
                    <a class="nav-link text-warning" th:href="@{/}">
                        <i class="fas fa-external-link-alt"></i> Xem trang chủ web
                    </a>
                </li>
            </ul>
        </div>

        <div class="col-md-10 main-content">
            
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <h2 class="fw-bold text-dark m-0" th:text="${article.id == null ? '✍️ Viết Bài Báo Mới' : '✏️ Sửa Bài Viết'}">Form</h2>
                    <nav aria-label="breadcrumb">
                        <ol class="breadcrumb mb-0 mt-1">
                            <li class="breadcrumb-item"><a th:href="@{/admin}" class="text-decoration-none">Dashboard</a></li>
                            <li class="breadcrumb-item active" aria-current="page" th:text="${article.id == null ? 'Thêm mới' : 'Chỉnh sửa'}"></li>
                        </ol>
                    </nav>
                </div>
                
                <div>
                    <span class="me-3 fw-bold text-secondary" sec:authorize="isAuthenticated()">
                        Xin chào, <span sec:authentication="name">Admin</span>!
                    </span>
                    <a th:href="@{/logout}" class="btn btn-outline-danger btn-sm">
                        <i class="fas fa-sign-out-alt"></i> Đăng xuất
                    </a>
                </div>
            </div>

            <div class="card">
                <div class="card-body p-4">
                    <form th:action="@{/admin/article/save}" th:object="${article}" method="post" enctype="multipart/form-data">
                        
                        <input type="hidden" th:field="*{id}" />

                        <div class="row">
                            <div class="col-md-8">
                                <div class="mb-3">
                                    <label class="form-label">Tiêu đề bài viết <span class="text-danger">*</span></label>
                                    <input type="text" class="form-control" th:field="*{title}" required placeholder="Nhập tiêu đề hấp dẫn..." />
                                </div>

                                <div class="mb-3">
                                    <label class="form-label">Đường dẫn (Slug) <span class="text-danger">*</span></label>
                                    <input type="text" class="form-control" th:field="*{slug}" required placeholder="vi-du-tieu-de-khong-dau" />
                                    <small class="text-muted">Đường dẫn hiển thị trên URL, viết liền không dấu, ngăn cách bằng dấu gạch ngang.</small>
                                </div>
                                
                                <div class="mb-3">
                                    <label class="form-label">Tóm tắt ngắn gọn <span class="text-danger">*</span></label>
                                    <textarea class="form-control" th:field="*{summary}" rows="3" required placeholder="Nhập tóm tắt hiển thị ngoài trang chủ..."></textarea>
                                </div>
                            </div>

                            <div class="col-md-4">
                                <div class="mb-3">
                                    <label class="form-label">Chuyên mục <span class="text-danger">*</span></label>
                                    <select name="category" class="form-select" required>
                                        <option value="" disabled selected th:if="${article.category == null}">-- Chọn chuyên mục --</option>
                                        <option th:each="cat : ${categories}" 
                                                th:value="${cat.id}" 
                                                th:text="${cat.name}"
                                                th:selected="${article.category != null and article.category.id == cat.id}">
                                        </option>
                                    </select>
                                </div>

                                <div class="mb-3 p-3 border rounded bg-light">
                                    <label class="form-label">Ảnh đại diện (Thumbnail)</label>
                                    <input type="file" name="file" class="form-control mb-2" accept="image/*" />
                                    <div th:if="${article.thumbnailUrl != null}" class="current-thumb-wrapper">
                                        <p class="small text-muted mb-1"><i class="fas fa-image"></i> Ảnh hiện tại:</p>
                                        <img th:src="${article.thumbnailUrl}" class="current-thumb" alt="Thumbnail" />
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="mb-4 mt-3">
                            <label class="form-label">Nội dung chi tiết bài báo <span class="text-danger">*</span></label>
                            <textarea th:field="*{content}" id="editor-content"></textarea>
                        </div>

                        <hr>

                        <div class="d-flex justify-content-end mt-4">
                            <a th:href="@{/admin}" class="btn btn-light me-2 border">
                                <i class="fas fa-times"></i> Hủy bỏ
                            </a>
                            <button type="submit" class="btn btn-primary px-4">
                                <i class="fas fa-save"></i> <span th:text="${article.id == null ? 'Đăng bài viết' : 'Lưu thay đổi'}"></span>
                            </button>
                        </div>
                    </form>
                </div>
            </div>
            
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    ClassicEditor
        .create( document.querySelector( '#editor-content' ), {
            toolbar: [ 
                'heading', '|', 
                'bold', 'italic', 'link', 'bulletedList', 'numberedList', 'blockQuote', '|',
                'insertTable', 'mediaEmbed', 'undo', 'redo' 
            ]
        } )
        .catch( error => {
            console.error( 'Lỗi CKEditor:', error );
        } );
</script>
</body>
</html>
