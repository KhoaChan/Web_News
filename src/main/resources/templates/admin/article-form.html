<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title th:text="${articleForm.id == null ? 'Create Article' : 'Edit Article'}">Article Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.ckeditor.com/ckeditor5/41.1.0/classic/ckeditor.js"></script>
    <style>
        body { font-family: 'Nunito', sans-serif; background-color: #f4f6f9; }
        .sidebar { min-height: 100vh; background-color: #343a40; color: #fff; padding-top: 20px; }
        .sidebar .nav-link { color: #c2c7d0; padding: 12px 20px; margin-bottom: 5px; border-radius: 5px; transition: all 0.3s; }
        .sidebar .nav-link:hover, .sidebar .nav-link.active { background-color: #007bff; color: #fff; }
        .main-content { padding: 30px; }
        .card { border: none; box-shadow: 0 0 15px rgba(0,0,0,0.05); border-radius: 10px; }
        .ck-editor__editable_inline { min-height: 320px; }
    </style>
</head>
<body>
<div class="container-fluid p-0">
    <div class="row g-0">
        <div class="col-md-2 sidebar d-none d-md-block">
            <h4 class="text-center mb-4 fw-bold text-white"><i class="fas fa-newspaper text-primary"></i> Admin Panel</h4>
            <ul class="nav flex-column px-2">
                <li class="nav-item"><a class="nav-link active" th:href="@{/admin}"><i class="fas fa-tachometer-alt"></i> Articles</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/admin/categories}"><i class="fas fa-folder-open"></i> Categories</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/admin/users}"><i class="fas fa-users"></i> Users</a></li>
                <li class="nav-item mt-4"><a class="nav-link text-warning" th:href="@{/}"><i class="fas fa-external-link-alt"></i> View Site</a></li>
            </ul>
        </div>

        <div class="col-md-10 main-content">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <h2 class="fw-bold m-0" th:text="${articleForm.id == null ? 'Create Article' : 'Edit Article'}">Article Form</h2>
                    <p class="text-muted mb-0">Keep content clean, validated, and easy to manage.</p>
                </div>
                <div>
                    <span class="me-3 fw-bold text-secondary" sec:authorize="isAuthenticated()">
                        Signed in as <span sec:authentication="principal.displayName">Admin</span>
                    </span>
                    <a th:href="@{/logout}" class="btn btn-outline-danger btn-sm"><i class="fas fa-sign-out-alt"></i> Logout</a>
                </div>
            </div>

            <div class="card">
                <div class="card-body p-4">
                    <form th:action="@{/admin/article/save}" th:object="${articleForm}" method="post" enctype="multipart/form-data">
                        <input type="hidden" th:field="*{id}">

                        <div class="row">
                            <div class="col-lg-8">
                                <div class="mb-3">
                                    <label class="form-label">Title</label>
                                    <input type="text" class="form-control" th:field="*{title}" th:classappend="${#fields.hasErrors('title')} ? ' is-invalid' : ''">
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></div>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label">Slug</label>
                                    <input type="text" class="form-control" th:field="*{slug}" th:classappend="${#fields.hasErrors('slug')} ? ' is-invalid' : ''">
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('slug')}" th:errors="*{slug}"></div>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label">Summary</label>
                                    <textarea class="form-control" rows="3" th:field="*{summary}" th:classappend="${#fields.hasErrors('summary')} ? ' is-invalid' : ''"></textarea>
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('summary')}" th:errors="*{summary}"></div>
                                </div>
                            </div>

                            <div class="col-lg-4">
                                <div class="mb-3">
                                    <label class="form-label">Category</label>
                                    <select class="form-select" th:field="*{categoryId}" th:classappend="${#fields.hasErrors('categoryId')} ? ' is-invalid' : ''">
                                        <option value="">Select a category</option>
                                        <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}"></option>
                                    </select>
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('categoryId')}" th:errors="*{categoryId}"></div>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label">Status</label>
                                    <select class="form-select" th:field="*{status}" th:classappend="${#fields.hasErrors('status')} ? ' is-invalid' : ''">
                                        <option th:each="statusValue : ${articleStatuses}" th:value="${statusValue.name()}" th:text="${statusValue.name()}"></option>
                                    </select>
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('status')}" th:errors="*{status}"></div>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label">Thumbnail</label>
                                    <input type="file" name="file" class="form-control" accept="image/*">
                                    <div class="mt-2 p-2 border rounded bg-light" th:if="${articleForm.thumbnailUrl != null}">
                                        <div class="small text-muted mb-2">Current thumbnail</div>
                                        <img th:src="${articleForm.thumbnailUrl}" alt="Thumbnail" class="img-fluid rounded">
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label">Content</label>
                            <textarea id="editor-content" th:field="*{content}" th:classappend="${#fields.hasErrors('content')} ? ' is-invalid' : ''"></textarea>
                            <div class="invalid-feedback d-block" th:if="${#fields.hasErrors('content')}" th:errors="*{content}"></div>
                        </div>

                        <div class="d-flex justify-content-end">
                            <a th:href="@{/admin}" class="btn btn-light border me-2">Cancel</a>
                            <button type="submit" class="btn btn-primary px-4" th:text="${articleForm.id == null ? 'Create Article' : 'Save Changes'}">Save</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    ClassicEditor
        .create(document.querySelector('#editor-content'))
        .catch(error => console.error(error));
</script>
<script>
    function generateSlug(text) {
        return text.toString().toLowerCase()
            .normalize('NFD')
            .replace(/[\u0300-\u036f]/g, '')
            .replace(/\u0111/g, 'd')
            .replace(/[^a-z0-9\s-]/g, '')
            .trim()
            .replace(/\s+/g, '-')
            .replace(/-+/g, '-');
    }

    const titleInput = document.getElementById('title');
    const slugInput = document.getElementById('slug');

    if (titleInput && slugInput) {
        titleInput.addEventListener('input', function() {
            slugInput.value = generateSlug(this.value);
        });
    }
</script>
</body>
</html>
