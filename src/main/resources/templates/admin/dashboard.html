<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/backoffice :: head(${pageTitle})}"></head>
<body class="backoffice-body">
<div th:replace="~{fragments/backoffice :: shell(${activeKey}, ${pageTitle}, ${pageSubtitle}, ~{::content})}">
    <th:block th:fragment="content">
        <div class="card backoffice-card">
            <div class="card-header py-3 d-flex justify-content-between align-items-center">
                <div>
                    <h5 class="m-0 text-primary">Article List</h5>
                    <div class="small text-muted">Admin can jump into editorial and author workspaces from the shared sidebar.</div>
                </div>
                <a th:href="@{/admin/article/create}" class="btn btn-primary btn-sm"><i class="fas fa-plus me-1"></i>New Article</a>
            </div>

            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover mb-0">
                        <thead>
                        <tr>
                            <th class="ps-3">ID</th>
                            <th>Title</th>
                            <th>Author</th>
                            <th>Category</th>
                            <th>Status</th>
                            <th>Views</th>
                            <th class="text-center">Actions</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="article : ${articles}">
                            <td class="ps-3 fw-bold text-secondary" th:text="${article.id}">1</td>
                            <td>
                                <div class="d-flex align-items-center">
                                    <img th:if="${article.thumbnailUrl != null}" th:src="${article.thumbnailUrl}" class="rounded me-2" style="width: 44px; height: 44px; object-fit: cover;" alt="Thumbnail">
                                    <div>
                                        <div class="fw-bold text-dark" th:text="${article.title}">Article title</div>
                                        <small class="text-muted" th:text="${article.slug}">slug</small>
                                    </div>
                                </div>
                            </td>
                            <td th:text="${article.author.fullName != null and !#strings.isEmpty(article.author.fullName) ? article.author.fullName : article.author.username}">Author</td>
                            <td><span class="badge bg-info text-dark" th:text="${article.category.name}">Category</span></td>
                            <td>
                                <span class="badge"
                                      th:classappend="${article.status.name() == 'PUBLISHED' ? ' bg-success' : article.status.name() == 'IN_REVIEW' ? ' bg-primary' : article.status.name() == 'CHANGES_REQUESTED' ? ' bg-warning text-dark' : article.status.name() == 'CANCELLED' ? ' bg-danger' : ' bg-secondary'}"
                                      th:text="${article.status.name()}">STATUS</span>
                            </td>
                            <td th:text="${article.views}">0</td>
                            <td class="text-center">
                                <a th:href="@{/admin/article/edit/{id}(id=${article.id})}" class="btn btn-outline-primary btn-sm me-1"><i class="fas fa-edit"></i></a>
                                <a th:href="@{/admin/article/delete/{id}(id=${article.id})}" class="btn btn-outline-danger btn-sm" onclick="return confirm('Delete this article?');"><i class="fas fa-trash-alt"></i></a>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(articles)}">
                            <td colspan="7" class="text-center py-4 text-muted">No articles found.</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </th:block>
</div>
</body>
</html>
