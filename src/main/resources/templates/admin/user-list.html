<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>User Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Nunito', sans-serif; background-color: #f4f6f9; }
        .sidebar { min-height: 100vh; background-color: #343a40; color: #fff; padding-top: 20px; }
        .sidebar .nav-link { color: #c2c7d0; padding: 12px 20px; margin-bottom: 5px; border-radius: 5px; transition: all 0.3s; }
        .sidebar .nav-link:hover, .sidebar .nav-link.active { background-color: #007bff; color: #fff; }
        .main-content { padding: 30px; }
        .card { border: none; box-shadow: 0 0 15px rgba(0,0,0,0.05); border-radius: 10px; }
        .table td { vertical-align: middle; }
    </style>
</head>
<body>
<div class="container-fluid p-0">
    <div class="row g-0">
        <div class="col-md-2 sidebar d-none d-md-block">
            <h4 class="text-center mb-4 fw-bold text-white"><i class="fas fa-newspaper text-primary"></i> Admin Panel</h4>
            <ul class="nav flex-column px-2">
                <li class="nav-item"><a class="nav-link" th:href="@{/admin}"><i class="fas fa-tachometer-alt"></i> Articles</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/admin/categories}"><i class="fas fa-folder-open"></i> Categories</a></li>
                <li class="nav-item"><a class="nav-link active" th:href="@{/admin/users}"><i class="fas fa-users"></i> Users</a></li>
                <li class="nav-item mt-4"><a class="nav-link text-warning" th:href="@{/}"><i class="fas fa-external-link-alt"></i> View Site</a></li>
            </ul>
        </div>

        <div class="col-md-10 main-content">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <h2 class="fw-bold m-0">Users</h2>
                    <p class="text-muted mb-0">Manage reader accounts and admin access safely.</p>
                </div>
                <div>
                    <span class="me-3 fw-bold text-secondary" sec:authorize="isAuthenticated()">
                        Signed in as <span sec:authentication="principal.displayName">Admin</span>
                    </span>
                    <a th:href="@{/logout}" class="btn btn-outline-danger btn-sm"><i class="fas fa-sign-out-alt"></i> Logout</a>
                </div>
            </div>

            <div class="alert alert-success" th:if="${successMessage}" th:text="${successMessage}"></div>

            <div class="card">
                <div class="card-header bg-white py-3 d-flex justify-content-between align-items-center">
                    <h5 class="m-0 text-primary">User List</h5>
                    <a th:href="@{/admin/user/create}" class="btn btn-primary btn-sm"><i class="fas fa-plus"></i> New User</a>
                </div>
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover mb-0">
                            <thead>
                            <tr>
                                <th class="ps-3">ID</th>
                                <th>User</th>
                                <th>Email</th>
                                <th>Role</th>
                                <th>Status</th>
                                <th class="text-center">Actions</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="user : ${users}">
                                <td class="ps-3 fw-bold text-secondary" th:text="${user.id}">1</td>
                                <td>
                                    <div class="fw-bold text-dark" th:text="${user.fullName != null and !#strings.isEmpty(user.fullName) ? user.fullName : user.username}">Display name</div>
                                    <small class="text-muted" th:text="${user.username}">username</small>
                                </td>
                                <td th:text="${user.email}">email</td>
                                <td><span class="badge bg-info text-dark" th:text="${user.role.name()}">USER</span></td>
                                <td>
                                    <span class="badge bg-success" th:if="${user.enabled}">Enabled</span>
                                    <span class="badge bg-secondary" th:if="${!user.enabled}">Disabled</span>
                                </td>
                                <td class="text-center">
                                    <a th:href="@{/admin/user/edit/{id}(id=${user.id})}" class="btn btn-outline-primary btn-sm me-1"><i class="fas fa-edit"></i></a>
                                    <form th:action="@{/admin/user/toggle-status/{id}(id=${user.id})}" method="post" class="d-inline">
                                        <button type="submit" class="btn btn-outline-warning btn-sm" th:title="${user.enabled ? 'Disable user' : 'Enable user'}">
                                            <i class="fas" th:classappend="${user.enabled} ? ' fa-user-slash' : ' fa-user-check'"></i>
                                        </button>
                                    </form>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(users)}">
                                <td colspan="6" class="text-center py-4 text-muted">No users found.</td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
