<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/backoffice :: head(${pageTitle})}"></head>
<body class="backoffice-body">
<div th:replace="~{fragments/backoffice :: shell(${activeKey}, ${pageTitle}, ${pageSubtitle}, ~{::content})}">
    <th:block th:fragment="content">
        <div class="card backoffice-card">
            <div class="card-header py-3 d-flex justify-content-between align-items-center">
                <div>
                    <h5 class="m-0 text-primary">User List</h5>
                    <div class="small text-muted">Admin keeps full control over all newsroom roles from the same backoffice shell.</div>
                </div>
                <a th:href="@{/admin/user/create}" class="btn btn-primary btn-sm"><i class="fas fa-plus me-1"></i>New User</a>
            </div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover mb-0">
                        <thead>
                        <tr>
                            <th class="ps-3">ID</th>
                            <th>User</th>
                            <th>Email</th>
                            <th>Role</th>
                            <th>Status</th>
                            <th class="text-center">Actions</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="user : ${users}">
                            <td class="ps-3 fw-bold text-secondary" th:text="${user.id}">1</td>
                            <td>
                                <div class="fw-bold text-dark" th:text="${user.fullName != null and !#strings.isEmpty(user.fullName) ? user.fullName : user.username}">Display name</div>
                                <small class="text-muted" th:text="${user.username}">username</small>
                            </td>
                            <td th:text="${user.email}">email</td>
                            <td><span class="badge bg-info text-dark" th:text="${user.role.name()}">USER</span></td>
                            <td>
                                <span class="badge bg-success" th:if="${user.enabled}">Enabled</span>
                                <span class="badge bg-secondary" th:if="${!user.enabled}">Disabled</span>
                            </td>
                            <td class="text-center">
                                <a th:href="@{/admin/user/edit/{id}(id=${user.id})}" class="btn btn-outline-primary btn-sm me-1"><i class="fas fa-edit"></i></a>
                                <form th:action="@{/admin/user/toggle-status/{id}(id=${user.id})}" method="post" class="d-inline">
                                    <button type="submit" class="btn btn-outline-warning btn-sm" th:title="${user.enabled ? 'Disable user' : 'Enable user'}">
                                        <i class="fas" th:classappend="${user.enabled} ? ' fa-user-slash' : ' fa-user-check'"></i>
                                    </button>
                                </form>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(users)}">
                            <td colspan="6" class="text-center py-4 text-muted">No users found.</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </th:block>
</div>
</body>
</html>
