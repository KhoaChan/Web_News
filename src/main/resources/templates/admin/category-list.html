<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/backoffice :: head(${pageTitle})}"></head>
<body class="backoffice-body">
<div th:replace="~{fragments/backoffice :: shell(${activeKey}, ${pageTitle}, ${pageSubtitle}, ~{::content})}">
    <th:block th:fragment="content">
        <div class="card backoffice-card">
            <div class="card-header py-3 d-flex justify-content-between align-items-center">
                <div>
                    <h5 class="m-0 text-primary">Danh sách chuyên mục</h5>
                    <div class="small text-muted">Chuyên mục do quản trị viên quản lý, còn các vai trò biên tập tập trung vào luồng xuất bản.</div>
                </div>
                <a th:href="@{/admin/category/create}" class="btn btn-primary btn-sm"><i class="fas fa-plus me-1"></i>Tạo chuyên mục</a>
            </div>

            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover mb-0">
                        <thead>
                        <tr>
                            <th class="ps-3">ID</th>
                            <th>Tên</th>
                            <th>Đường dẫn</th>
                            <th>Mô tả</th>
                            <th class="text-center">Thao tác</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="cat : ${categories}">
                            <td class="ps-3 fw-bold text-secondary" th:text="${cat.id}">1</td>
                            <td class="fw-bold text-dark" th:text="${cat.name}">Chuyên mục</td>
                            <td><span class="badge bg-light text-dark border" th:text="${cat.slug}">slug</span></td>
                            <td th:text="${cat.description}">Mô tả</td>
                            <td class="text-center">
                                <a th:href="@{/admin/category/edit/{id}(id=${cat.id})}" class="btn btn-outline-primary btn-sm me-1"><i class="fas fa-edit"></i></a>
                                <a th:href="@{/admin/category/delete/{id}(id=${cat.id})}" class="btn btn-outline-danger btn-sm" onclick="return confirm('Bạn có chắc muốn xóa chuyên mục này?');"><i class="fas fa-trash-alt"></i></a>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(categories)}">
                            <td colspan="5" class="text-center py-4 text-muted">Chưa có chuyên mục nào.</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </th:block>
</div>
</body>
</html>
