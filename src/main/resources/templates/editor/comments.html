<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/backoffice :: head(${pageTitle})}"></head>
<body class="backoffice-body">
<div th:replace="~{fragments/backoffice :: shell(${activeKey}, ${pageTitle}, ${pageSubtitle}, ~{::content})}">
    <th:block th:fragment="content">
        <div class="card backoffice-card">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover mb-0 align-middle">
                        <thead>
                        <tr>
                            <th class="ps-3">Article</th>
                            <th>Reader</th>
                            <th>Comment</th>
                            <th>Submitted</th>
                            <th class="text-center">Actions</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="comment : ${pendingComments}">
                            <td class="ps-3 fw-bold" th:text="${comment.article.title}">Article</td>
                            <td th:text="${comment.commenterName}">Reader</td>
                            <td th:text="${comment.content}">Comment</td>
                            <td th:text="${#temporals.format(comment.createdAt, 'dd/MM/yyyy HH:mm')}">Time</td>
                            <td class="text-center">
                                <form th:action="@{/editor/comment/approve/{id}(id=${comment.id})}" method="post" class="d-inline">
                                    <button type="submit" class="btn btn-outline-success btn-sm me-1">Approve</button>
                                </form>
                                <form th:action="@{/editor/comment/reject/{id}(id=${comment.id})}" method="post" class="d-inline">
                                    <button type="submit" class="btn btn-outline-danger btn-sm">Reject</button>
                                </form>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(pendingComments)}">
                            <td colspan="5" class="text-center py-4 text-muted">No comments are waiting for moderation.</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </th:block>
</div>
</body>
</html>
