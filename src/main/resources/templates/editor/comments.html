<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/backoffice :: head(${pageTitle})}"></head>
<body class="backoffice-body">
<div th:replace="~{fragments/backoffice :: shell(${activeKey}, ${pageTitle}, ${pageSubtitle}, ~{::content})}">
    <th:block th:fragment="content">
        <div class="card backoffice-card">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover mb-0 align-middle">
                        <thead>
                        <tr>
                            <th class="ps-3">Bài viết</th>
                            <th>Độc giả</th>
                            <th>Bình luận</th>
                            <th>Thời gian gửi</th>
                            <th class="text-center">Thao tác</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="comment : ${pendingComments}">
                            <td class="ps-3 fw-bold" th:text="${comment.article.title}">Bài viết</td>
                            <td th:text="${comment.commenterName}">Độc giả</td>
                            <td th:text="${comment.content}">Bình luận</td>
                            <td th:text="${#temporals.format(comment.createdAt, 'dd/MM/yyyy HH:mm')}">Thời gian</td>
                            <td class="text-center">
                                <form th:action="@{/editor/comment/approve/{id}(id=${comment.id})}" method="post" class="d-inline">
                                    <button type="submit" class="btn btn-outline-success btn-sm me-1">Duyệt</button>
                                </form>
                                <form th:action="@{/editor/comment/reject/{id}(id=${comment.id})}" method="post" class="d-inline">
                                    <button type="submit" class="btn btn-outline-danger btn-sm">Từ chối</button>
                                </form>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(pendingComments)}">
                            <td colspan="5" class="text-center py-4 text-muted">Không có bình luận nào đang chờ kiểm duyệt.</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </th:block>
</div>
</body>
</html>
