<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/backoffice :: head(${pageTitle})}"></head>
<body class="backoffice-body">
<div th:replace="~{fragments/backoffice :: shell(${activeKey}, ${pageTitle}, ${pageSubtitle}, ~{::content})}">
    <th:block th:fragment="content">
        <style>
            .article-body img { max-width: 100%; height: auto; }
        </style>
        <div class="card backoffice-card">
            <div class="card-body p-4 p-lg-5">
                <div class="row g-4">
                    <div class="col-xl-8">
                        <h2 class="h3" th:text="${article.title}">Tiêu đề bài viết</h2>
                        <p class="text-muted mb-3">
                            <span th:text="${article.author.fullName != null and !#strings.isEmpty(article.author.fullName) ? article.author.fullName : article.author.username}">Tác giả</span>
                            • <span th:text="${article.category.name}">Chuyên mục</span>
                            • <span th:text="${article.status.displayName}">Chờ duyệt</span>
                        </p>
                        <p class="lead" th:text="${article.summary}">Tóm tắt</p>
                        <div class="article-body" th:utext="${article.content}"></div>
                    </div>
                    <div class="col-xl-4">
                        <div class="border rounded p-3 bg-light" th:if="${article.thumbnailUrl != null}">
                            <div class="small text-muted mb-2">Ảnh đại diện</div>
                            <img th:src="${article.thumbnailUrl}" alt="Ảnh đại diện" class="img-fluid rounded">
                        </div>
                        <div class="border rounded p-3 mt-3 bg-white">
                            <div class="small text-muted mb-2">Thao tác xử lý</div>
                            <form th:action="@{/editor/article/publish/{id}(id=${article.id})}" method="post" class="mb-3">
                                <button type="submit" class="btn btn-success w-100">Xuất bản</button>
                            </form>
                            <form th:action="@{/editor/article/request-changes/{id}(id=${article.id})}" method="post" class="mb-3">
                                <label class="form-label">Ghi chú yêu cầu chỉnh sửa</label>
                                <textarea name="reviewNote" rows="4" class="form-control mb-2" placeholder="Nêu rõ những nội dung cần chỉnh sửa"></textarea>
                                <button type="submit" class="btn btn-warning w-100">Yêu cầu chỉnh sửa</button>
                            </form>
                            <form th:action="@{/editor/article/cancel/{id}(id=${article.id})}" method="post">
                                <label class="form-label">Ghi chú hủy bài</label>
                                <textarea name="reviewNote" rows="3" class="form-control mb-2" placeholder="Giải thích lý do bài viết bị hủy"></textarea>
                                <button type="submit" class="btn btn-outline-danger w-100">Hủy bài viết</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </th:block>
</div>
</body>
</html>
